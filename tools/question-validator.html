<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>問題データ検証ツール - さんすう文章題クエスト！</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #14101f;
    --panel: #201a33;
    --panel-border: rgba(255, 255, 255, 0.1);
    --text: #f2eeff;
    --text-dim: #a99fc9;
    --ok: #3ddc84;
    --error: #ff5d78;
    --accent: #ffd23f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    line-height: 1.6;
  }
  h1 {
    font-size: 1.4rem;
    margin: 0 0 4px;
  }
  p.desc {
    color: var(--text-dim);
    margin: 0 0 20px;
    font-size: 0.9rem;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  button#rerun-btn {
    background: var(--accent);
    color: #2b1b00;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
  }
  button#rerun-btn:active {
    transform: translateY(1px);
  }
  .stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .stat-box {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 12px 18px;
    min-width: 140px;
  }
  .stat-box .label {
    font-size: 0.75rem;
    color: var(--text-dim);
  }
  .stat-box .value {
    font-size: 1.6rem;
    font-weight: 800;
  }
  .stat-box.ok .value { color: var(--ok); }
  .stat-box.error .value { color: var(--error); }
  #template-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .template-card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-left-width: 4px;
    border-radius: 10px;
    padding: 12px 16px;
  }
  .template-card.ok { border-left-color: var(--ok); }
  .template-card.error { border-left-color: var(--error); }
  .template-card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .badge {
    font-size: 0.7rem;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .badge-ok { background: rgba(61, 220, 132, 0.2); color: var(--ok); }
  .badge-error { background: rgba(255, 93, 120, 0.2); color: var(--error); }
  .template-id {
    font-family: "Consolas", "Menlo", monospace;
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .template-category {
    font-weight: 700;
  }
  .template-meta {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .template-sample {
    font-size: 0.85rem;
    margin-bottom: 4px;
  }
  .template-example {
    background: rgba(255, 255, 255, 0.04);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 0.85rem;
    margin-bottom: 6px;
  }
  .template-errors {
    margin: 6px 0 0;
    padding-left: 20px;
    color: var(--error);
    font-size: 0.82rem;
  }
  .template-errors li {
    margin-bottom: 2px;
  }
  .badge-new { background: rgba(255, 210, 63, 0.2); color: var(--accent); }
  .badge-review { background: rgba(157, 175, 255, 0.2); color: #9dafff; }
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .filter-bar label {
    font-size: 0.78rem;
    color: var(--text-dim);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .filter-bar select {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 0.85rem;
  }
  .filter-count {
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
</style>
</head>
<body>
  <h1>問題データ検証ツール</h1>
  <p class="desc">
    data/index.js に登録されているすべての問題テンプレートを検証します。
    1段階問題（questionType: "singleStep"）は数値を変えて10回、
    2段階問題（questionType: "multiStep"）は数値を変えて20回生成し、
    2段階問題はさらに、すべての解法ルートを実際に最後まで解けるかもシミュレーションします。
    「再検証」を押すたびに乱数を変えて再実行します。
  </p>

  <div class="toolbar">
    <button id="rerun-btn" type="button">再検証する</button>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="label">総テンプレート数</div>
      <div class="value" id="stat-total">-</div>
    </div>
    <div class="stat-box ok">
      <div class="label">正常なテンプレート数</div>
      <div class="value" id="stat-ok">-</div>
    </div>
    <div class="stat-box error">
      <div class="label">エラーがあるテンプレート数</div>
      <div class="value" id="stat-error">-</div>
    </div>
  </div>

  <div class="toolbar filter-bar">
    <label>出題範囲
      <select id="filter-gradeTerm"><option value="all">すべて</option></select>
    </label>
    <label>カテゴリ
      <select id="filter-category"><option value="all">すべて</option></select>
    </label>
    <label>段階
      <select id="filter-questionType">
        <option value="all">すべて</option>
        <option value="singleStep">1段階のみ</option>
        <option value="multiStep">2段階のみ</option>
      </select>
    </label>
    <label>判定
      <select id="filter-validity">
        <option value="all">すべて</option>
        <option value="ok">正常のみ</option>
        <option value="error">エラーのみ</option>
      </select>
    </label>
  </div>
  <div class="filter-count" id="filter-count"></div>

  <div id="template-list"></div>

  <script type="module">
    import { getAllTemplates } from "../data/index.js";
    import { validateTemplateSet, validateGeneratedQuestion } from "../js/question-validator.js";
    import { generateQuestionFromTemplate, getContentGroup } from "../js/question-generator.js";
    import { simulateAllRoutesToCompletion } from "../js/multi-step-engine.js";
    import { formatNumber } from "../js/number-utils.js";

    const SINGLE_STEP_SAMPLE_COUNT = 10;
    const MULTI_STEP_SAMPLE_COUNT = 20;

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (c) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    function formatExample(problem) {
      if (problem.questionType === "multiStep") {
        const steps = problem.solutionRoutes[0].steps
          .map((s, i) => `式${i + 1}: ${formatNumber(s.left)}${s.operator}${formatNumber(s.right)}=${formatNumber(s.result)}`)
          .join(" / ");
        return { text: problem.text, formula: steps, result: formatNumber(problem.answer), unit: problem.answerUnit };
      }
      return {
        text: problem.text,
        formula: `${formatNumber(problem.left)}${problem.operator}${formatNumber(problem.right)}`,
        result: formatNumber(problem.result),
        unit: problem.answerUnit
      };
    }

    /**
     * 各テンプレートについて、構造検証と「数値を変えて複数回生成」の両方を実行し、
     * 表示用の行データにまとめる。2段階問題は、さらに全ルートの完答シミュレーションも行う。
     */
    function buildRows() {
      const templates = getAllTemplates();
      const { results: structuralResults } = validateTemplateSet(templates);
      const byId = new Map(templates.map((t) => [t.id, t]));

      return structuralResults.map((structural) => {
        const template = byId.get(structural.id);
        const isMultiStep = template && template.questionType === "multiStep";
        const sampleCount = isMultiStep ? MULTI_STEP_SAMPLE_COUNT : SINGLE_STEP_SAMPLE_COUNT;

        const row = {
          id: structural.id,
          category: structural.category,
          gradeTerm: template ? template.gradeTerm : "-",
          difficulty: template ? template.difficulty : "-",
          questionType: template ? template.questionType : "-",
          generatorType: template ? template.generatorType : "-",
          contentGroup: template ? getContentGroup(template) : "-",
          sampleCount,
          structuralErrors: structural.errors,
          sampleErrors: [],
          sampleSuccessCount: 0,
          example: null
        };

        if (structural.valid && template) {
          for (let i = 0; i < sampleCount; i++) {
            try {
              const problem = generateQuestionFromTemplate(template);
              const { valid, errors } = validateGeneratedQuestion(problem);
              let sampleOk = valid;
              if (!valid) {
                row.sampleErrors.push(...errors);
              }

              if (isMultiStep) {
                const simResult = simulateAllRoutesToCompletion(problem);
                if (!simResult.valid) {
                  sampleOk = false;
                  row.sampleErrors.push(...simResult.errors);
                }
              }

              if (sampleOk) {
                row.sampleSuccessCount += 1;
              }
              if (i === 0) {
                row.example = formatExample(problem);
              }
            } catch (error) {
              row.sampleErrors.push(`生成中に例外が発生しました: ${error.message}`);
            }
          }
        }

        row.overallValid = structural.valid && row.sampleSuccessCount === sampleCount;
        return row;
      });
    }

    function renderRow(row) {
      const uniqueErrors = [...new Set([...row.structuralErrors, ...row.sampleErrors])];
      const errorsHtml = uniqueErrors.length
        ? `<ul class="template-errors">${uniqueErrors.slice(0, 15).map((e) => `<li>${escapeHtml(e)}</li>`).join("")}</ul>`
        : "";
      const exampleHtml = row.example
        ? `<div class="template-example">
             <div>例: ${escapeHtml(row.example.text)}</div>
             <div>正解式: ${escapeHtml(row.example.formula)}${row.questionType === "multiStep" ? "" : ` = ${escapeHtml(row.example.result)}${escapeHtml(row.example.unit || "")}`}</div>
             ${row.questionType === "multiStep" ? `<div>答え: ${escapeHtml(row.example.result)}${escapeHtml(row.example.unit || "")}</div>` : ""}
           </div>`
        : "";

      const card = document.createElement("div");
      card.className = `template-card ${row.overallValid ? "ok" : "error"}`;
      card.innerHTML = `
        <div class="template-card-head">
          <span class="badge ${row.overallValid ? "badge-ok" : "badge-error"}">${row.overallValid ? "OK" : "NG"}</span>
          <span class="badge ${row.contentGroup === "new" ? "badge-new" : "badge-review"}">${row.contentGroup === "new" ? "新内容" : row.contentGroup === "review" ? "復習内容" : "-"}</span>
          <span class="template-id">${escapeHtml(row.id)}</span>
          <span class="template-category">${escapeHtml(row.category)}</span>
        </div>
        <div class="template-meta">
          gradeTerm: ${escapeHtml(row.gradeTerm)} / difficulty: ${escapeHtml(row.difficulty)} /
          questionType: ${escapeHtml(row.questionType)} / generatorType: ${escapeHtml(row.generatorType)}
        </div>
        <div class="template-sample">生成テスト: ${row.sampleSuccessCount} / ${row.sampleCount} 回成功</div>
        ${exampleHtml}
        ${errorsHtml}
      `;
      return card;
    }

    let allRows = [];

    /**
     * フィルター用セレクトの選択肢を、実際に読み込まれたテンプレートの内容から動的に作る。
     * 選択中の値があれば維持し、なければ「すべて」に戻す。
     */
    function populateFilterOptions(rows) {
      const gradeTermSelect = document.getElementById("filter-gradeTerm");
      const categorySelect = document.getElementById("filter-category");
      const prevGradeTerm = gradeTermSelect.value || "all";
      const prevCategory = categorySelect.value || "all";

      const gradeTerms = [...new Set(rows.map((r) => r.gradeTerm))].sort();
      const categories = [...new Set(rows.map((r) => r.category))].sort();

      gradeTermSelect.innerHTML = '<option value="all">すべて</option>' +
        gradeTerms.map((g) => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join("");
      categorySelect.innerHTML = '<option value="all">すべて</option>' +
        categories.map((c) => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");

      if (gradeTerms.includes(prevGradeTerm)) gradeTermSelect.value = prevGradeTerm;
      if (categories.includes(prevCategory)) categorySelect.value = prevCategory;
    }

    function applyFilters(rows) {
      const gradeTerm = document.getElementById("filter-gradeTerm").value;
      const category = document.getElementById("filter-category").value;
      const questionType = document.getElementById("filter-questionType").value;
      const validity = document.getElementById("filter-validity").value;

      return rows.filter((row) => {
        if (gradeTerm !== "all" && row.gradeTerm !== gradeTerm) return false;
        if (category !== "all" && row.category !== category) return false;
        if (questionType !== "all" && row.questionType !== questionType) return false;
        if (validity === "ok" && !row.overallValid) return false;
        if (validity === "error" && row.overallValid) return false;
        return true;
      });
    }

    function renderList() {
      const filtered = applyFilters(allRows);
      document.getElementById("filter-count").textContent =
        `表示中: ${filtered.length} / ${allRows.length} 件`;

      const listEl = document.getElementById("template-list");
      listEl.innerHTML = "";
      for (const row of filtered) {
        listEl.appendChild(renderRow(row));
      }
    }

    function render() {
      allRows = buildRows();
      const total = allRows.length;
      const okCount = allRows.filter((r) => r.overallValid).length;
      const errorCount = total - okCount;

      document.getElementById("stat-total").textContent = String(total);
      document.getElementById("stat-ok").textContent = String(okCount);
      document.getElementById("stat-error").textContent = String(errorCount);

      populateFilterOptions(allRows);
      renderList();
    }

    document.getElementById("rerun-btn").addEventListener("click", render);
    for (const id of ["filter-gradeTerm", "filter-category", "filter-questionType", "filter-validity"]) {
      document.getElementById(id).addEventListener("change", renderList);
    }
    render();
  </script>
</body>
</html>
